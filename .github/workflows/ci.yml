name: ci

on:
  push:
    branches:
      - main
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required for MinVer tag-based versioning
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore hubspot.slnx
    
    - name: Build
      run: dotnet build hubspot.slnx --no-restore --configuration Release
    
    - name: Run tests
      run: |
        dotnet run --project test/HubSpot.Tests/HubSpot.Tests.csproj --no-build --configuration Release
        dotnet run --project sample/Sample/Sample.csproj --no-build --configuration Release
    
    - name: Build NuGet packages
      run: dotnet pack hubspot.slnx --no-build --configuration Release --output ./packages
    
    - name: Upload NuGet packages
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./packages/*.nupkg
    
    - name: Add build summary
      if: always()
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "✅ Build completed" >> $GITHUB_STEP_SUMMARY
        echo "✅ Tests executed" >> $GITHUB_STEP_SUMMARY
        echo "✅ NuGet packages created" >> $GITHUB_STEP_SUMMARY
