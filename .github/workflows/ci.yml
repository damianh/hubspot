name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for MinVer tag-based versioning

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore hubspot.slnx

      - name: Build
        run: dotnet build hubspot.slnx -c Release --no-restore

      - name: Test (main tests)
        run: dotnet run --project test/HubSpot.Tests/HubSpot.Tests.csproj -c Release --no-build

      - name: Test (sample tests)
        run: dotnet run --project sample/Sample/Sample.csproj -c Release --no-build

      - name: Pack
        run: dotnet pack hubspot.slnx -c Release --no-build -o ./artifacts

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: ./artifacts/*.nupkg
